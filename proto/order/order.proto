syntax = "proto3";

package order.v1;

option go_package = "github.com/yerdembek/AP2_assignment2/generated/order";

import "google/protobuf/timestamp.proto";

// OrderTrackingService streams real-time order status updates to subscribers.
service OrderTrackingService {
  rpc SubscribeToOrderUpdates(OrderRequest) returns (stream OrderStatusUpdate);
}

message OrderRequest {
  string order_id = 1;
}

message OrderStatusUpdate {
  string                    order_id   = 1;
  string                    status     = 2;  // "PENDING" | "PAID" | "PROCESSING" | "SHIPPED" | "DELIVERED" | "CANCELLED"
  google.protobuf.Timestamp updated_at = 3;
  string                    message    = 4;
}