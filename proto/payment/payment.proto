syntax = "proto3";

package payment.v1;

option go_package = "github.com/yerdembek/AP2_assignment2/generated/payment";

import "google/protobuf/timestamp.proto";

// PaymentService handles payment processing between Order and Payment services.
service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
  // Новый метод для получения статистики
  rpc GetPaymentStats(GetPaymentStatsRequest) returns (PaymentStats);
}

message GetPaymentStatsRequest {}

message PaymentStats {
  int64 total_count      = 1;
  int64 authorized_count = 2;
  int64 declined_count   = 3;
  int64 total_amount     = 4; // сумма всех amount в cents
}

message PaymentRequest {
  string order_id = 1;
  double amount   = 2;
  string currency = 3;
  string user_id  = 4;
}

message PaymentResponse {
  string                    payment_id    = 1;
  string                    status        = 2;  // "SUCCESS" | "FAILED" | "PENDING"
  google.protobuf.Timestamp processed_at  = 3;
  string                    message       = 4;
}